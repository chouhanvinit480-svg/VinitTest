<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Birthday ❤️</title>

  <link rel="stylesheet" href="../css/birthday.css">

</head>

<body>

  <!-- Background Effects -->

  <div id="hearts"></div>

  <div id="balloons"></div>

  <div id="flowers"></div>

  <div class="container">

    <h1>

      🎂 Happy Birthday 🎂

    </h1>

    <h2>

      My Beautiful Tanu Ji ❤️

    </h2>

    <p>

      Today is the most special day because my favourite person came into this world. ❤️

    </p>

    <!-- Cake -->

    <img id="cake" src="../image/cake.jpg" alt="Cake">

    <p>

      👆 Click the Cake 👆

    </p>

    <!-- Gift -->

    <img id="gift" src="../image/gift.jpg" alt="Gift">

    <p>

      🎁 Click the Gift 🎁

    </p>

    <div class="buttons">

      <button id="previousBtn">

        ⬅ Previous

      </button>

      <button id="continueBtn">

        Next ➜

      </button>

    </div>

  </div>

  <script src="../js/birthday.js"></script>

</body>

</html>
